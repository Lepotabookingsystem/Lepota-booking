<!-- Thai text data - kept outside JS to avoid encoding issues -->
<div id="data" style="display:none"
  data-months="มกราคม,กุมภาพันธ์,มีนาคม,เมษายน,พฤษภาคม,มิถุนายน,กรกฎาคม,สิงหาคม,กันยายน,ตุลาคม,พฤศจิกายน,ธันวาคม"
  data-days="อา,จ,อ,พ,พฤ,ศ,ส"
  data-mshort="ม.ค.,ก.พ.,มี.ค.,เม.ย.,พ.ค.,มิ.ย.,ก.ค.,ส.ค.,ก.ย.,ต.ค.,พ.ย.,ธ.ค."
  data-sl="รอยืนยัน,ยืนยันแล้ว,เสร็จสิ้น,ยกเลิก"
  data-pkl="เจ้าสาว 1 เวลา,เจ้าสาว 1.5 เวลา,เจ้าสาว 2 เวลา,รับปริญญา,Pre-Wedding,ออกงาน,ปาร์ตี้,อื่นๆ"
></div>

<script>
(function(){
"use strict";

// Read Thai text from DOM (avoids JS encoding issues)
var D = document.getElementById('data');
var MONTHS = D.getAttribute('data-months').split(',');
var TH_D   = D.getAttribute('data-days').split(',');
var TH_M   = D.getAttribute('data-mshort').split(',');
var SL_ARR = D.getAttribute('data-sl').split(',');
var PKL_ARR= D.getAttribute('data-pkl').split(',');

var SL  = {pending:SL_ARR[0], confirmed:SL_ARR[1], completed:SL_ARR[2], cancelled:SL_ARR[3]};
var SC  = {pending:'#C9A96E', confirmed:'#6DAA8A', completed:'#7A7060', cancelled:'#C9624A'};
var PKL = {bride_1:PKL_ARR[0], bride_15:PKL_ARR[1], bride_2:PKL_ARR[2], graduation:PKL_ARR[3], prewedding:PKL_ARR[4], event:PKL_ARR[5], party:PKL_ARR[6], other:PKL_ARR[7]};
var PKC = {bride_1:'#C084A8',bride_15:'#A855A7',bride_2:'#7C3AED',graduation:'#3B82F6',prewedding:'#EC4899',event:'#F59E0B',party:'#10B981',other:'#6B7280'};

var ADMIN_PIN = '1234';
var EJS_SVC='service_1', EJS_TPL='template_f42kzde', EJS_KEY='tEnYqxY9owi00x6gI';
var TODAY = new Date().toISOString().split('T')[0];
var THIS_M= TODAY.slice(0,7);
var THIS_Y= TODAY.slice(0,4);

// ── Storage ─ Google Sheets คือ database เดียว ไม่ใช้ localStorage ──
var bk = [];
var _saving = false;
var _saveQueued = false;

function parseCloudRows(data){
  return data.map(function(row){
    var obj={};
    Object.keys(row).forEach(function(k){
      try{ obj[k]=JSON.parse(row[k]); }catch(e){ obj[k]=row[k]; }
    });
    return obj;
  }).filter(function(b){ return b.id; });
}

// ล้าง localStorage เก่าทุก browser ที่อาจมีข้อมูลผิดค้างอยู่
try{ localStorage.removeItem('lepota'); }catch(e){}

// ดึงจาก Google Sheets เสมอ ไม่มี cache ใน browser
function fetchCloud(){
  return fetch(GAS_URL, {redirect:'follow', mode:'cors'})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.ok && d.data){ bk = parseCloudRows(d.data); }
      return bk;
    });
}

// บันทึกไป Google Sheets (queue ป้องกัน race condition)
function saveToCloud(){
  if(_saving){ _saveQueued=true; return; }
  _saving=true;
  fetch(GAS_URL, {
    method:'POST', redirect:'follow', mode:'cors',
    body: JSON.stringify({action:'save', bookings:bk})
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    _saving=false;
    if(_saveQueued){ _saveQueued=false; saveToCloud(); }
  })
  .catch(function(e){
    _saving=false;
    if(_saveQueued){ _saveQueued=false; saveToCloud(); }
    console.warn('Save failed:', e);
  });
}

function saveBk(){ saveToCloud(); }
function addBk(b){ bk.push(b); saveToCloud(); }
function updateBk(b){
  var idx=-1;
  bk.forEach(function(x,i){ if(x.id===b.id) idx=i; });
  if(idx>=0){ bk[idx]=JSON.parse(JSON.stringify(b)); }
  saveToCloud();
}

// โหลดครั้งแรก: loading screen → ดึง cloud → render
function loadBkInitial(){
  var root=document.getElementById('root');
  root.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">'
    +'<div style="font-size:20px;font-weight:700;letter-spacing:.15em;color:#C9A96E;font-family:'Cormorant Garamond',serif">LEPOTA MAKEUP</div>'
    +'<div style="font-size:12px;color:#7A7060;letter-spacing:.2em">กำลังโหลด...</div></div>';
  fetchCloud()
    .catch(function(e){ console.warn('Initial load failed:', e); })
    .then(function(){ render(); });
}

// refresh อัตโนมัติ ดึงจาก cloud ทุกครั้ง
function loadBk(){
  fetchCloud()
    .then(function(){
      if(page!=='admin' && page!=='booking' && page!=='status') render();
    })
    .catch(function(){});
}

// Router
var page = 'home';
var _adminUnlocked = false; // persist across renders
function go(p){ page=p; render(); window.scrollTo(0,0); }
window.go = go;

// DOM helpers
function el(tag,cls,html){
  var e=document.createElement(tag);
  if(cls) e.className=cls;
  if(html!=null) e.innerHTML=html;
  return e;
}
function div(cls,html){ return el('div',cls,html); }
function p(cls,html){ return el('p',cls,html); }
function sp(cls,html){ return el('span',cls,html); }
function mk_btn(cls,html,fn){ var b=el('button',cls,html); b.onclick=fn; return b; }
function mk_inp(cls,type,ph,val){
  var i=el('input',cls);
  i.type=type||'text'; i.placeholder=ph||''; i.value=val||'';
  return i;
}
function mk_lbl(txt){ return el('label','lbl',txt); }
function mk_badge(status){
  var b=sp('badge',SL[status]||status);
  b.style.background=(SC[status]||'#7A7060')+'20';
  b.style.color=SC[status]||'#7A7060';
  return b;
}
function mk_hdr(showAdmin){
  var h=div('hdr');
  var logo=div('');
  logo.innerHTML='<div class="logo-t">LEPOTA</div><div class="logo-s">Booking System</div>';
  logo.onclick=function(){ go('home'); };
  h.appendChild(logo);
  if(showAdmin!==false){
    var ab=mk_btn('btn-ghost','Admin',function(){ go('admin'); });
    h.appendChild(ab);
  }
  return h;
}
function mk_bnav(active, cb){
  var nav=div('bnav');
  var tabs=[['today','📋','งาน'],['bookings','📁','รายการจอง'],['summary','💰','สรุปยอด']];
  tabs.forEach(function(t){
    var b=div('bnav-btn');
    b.innerHTML='<span style="font-size:22px">'+t[1]+'</span>'
      +'<span class="bnav-lbl'+(active===t[0]?' on':'')+'">'+t[2]+'</span>'
      +(active===t[0]?'<div class="bnav-bar"></div>':'');
    b.onclick=function(){ cb(t[0]); };
    nav.appendChild(b);
  });
  return nav;
}
function mk_div(){ return div('div'); }
function sum_row(label,val,color){
  var r=div('sum-row');
  r.innerHTML='<span style="color:#7A7060">'+label+'</span>'
    +'<span style="color:'+(color||'#E8E4DC')+'">'+val+'</span>';
  return r;

function renderHome(){

    +'<div style="text-align:center;margin-bottom:20px;position:relative;z-index:1">'
    +'<h1 style="font-size:clamp(40px,10vw,80px);font-weight:300;letter-spacing:.2em;color:#C9A96E;font-family:\'Cormorant Garamond\',serif;line-height:1">LEPOTA</h1>'

  pg.appendChild(main);
  var cards=pg.querySelector('#hcards');
  var items=[
    {icon:'✦',title:'ลงนัดหมาย',   desc:'จองคิวแต่งหน้า\nสำหรับงานสำคัญ', action:'booking'},
    {icon:'◎',title:'ตรวจสอบสถานะ',desc:'ดูรายละเอียด\nการจองของคุณ',      action:'status'},
  ];
  items.forEach(function(item){
    var c=div('card');
    c.style.cssText='cursor:pointer;text-align:center;padding:36px 24px;transition:all .2s';
    c.innerHTML='<div style="font-size:28px;margin-bottom:14px;color:#C9A96E">'+item.icon+'</div>'
      +'<div style="font-size:16px;color:#C9A96E;letter-spacing:.06em;margin-bottom:10px">'+item.title+'</div>'
      +'<div style="font-size:12px;color:#7A7060;line-height:1.8">'+item.desc.replace('\n','<br>')+'</div>';

  });
  return pg;
}

function renderStatus(){
  var pg=div('page');
  pg.appendChild(mk_hdr());
  var wrap=div('wrap-sm');
  var back=mk_btn('btn-ghost','← กลับ',function(){ go('home'); });
  back.style.marginBottom='24px';
  wrap.appendChild(back);
  wrap.appendChild(el('h2','','ตรวจสอบสถานะนัดหมาย'));
  wrap.querySelector('h2').style.cssText='font-size:22px;font-weight:300;color:#C9A96E;margin-bottom:8px;font-family:\'Cormorant Garamond\',serif';
  wrap.appendChild(p('','ค้นหาด้วยเบอร์โทร หรือ Email')).style.cssText='font-size:13px;color:#7A7060;margin-bottom:24px';
  var row=div('flex gap8 mb16');
  var qi=mk_inp('inp','text','เบอร์โทร / Email'); qi.style.flex='1';
  var res=div('');
  var doSearch=function(){
    var q=qi.value.trim().toLowerCase(); res.innerHTML='';
    if(!q) return;
    var allFound=bk.filter(function(b){
      return (b.phone||'').includes(q)||(b.email||'').toLowerCase().includes(q);
    }).sort(function(a,b2){ return (a.date||'')>(b2.date||'')?1:-1; });
    if(!allFound.length){
      var empty=div('card center'); empty.style.padding='40px';
      empty.innerHTML='<p style="color:#7A7060">ไม่พบข้อมูลการจองค่ะ</p>';
      res.appendChild(empty); return;
    }
    if(allFound.length>1){
      var countRow=p('','พบ '+allFound.length+' รายการจอง');
      countRow.style.cssText='font-size:12px;color:#9A8E7E;margin-bottom:12px;letter-spacing:.05em';
      res.appendChild(countRow);
    }
    allFound.forEach(function(found){
      var c=div('card'); c.style.marginBottom='12px';
      var top=div('flex-sb mb12'); top.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:10px';
      var info=div('');
      info.innerHTML='<div style="font-size:18px;color:#E8E4DC;font-weight:500">'+found.nickname+'</div>'
        +'<div style="font-size:13px;color:#7A7060;margin-top:3px">'+found.packageLabel+'</div>';
      top.appendChild(info); top.appendChild(mk_badge(found.status));
      c.appendChild(top); c.appendChild(mk_div());
      var rows=[['วันที่',found.date],['เวลาเสร็จ',found.readyTime],['สถานที่',found.location]];
      rows.forEach(function(r){ if(r[1]) c.appendChild(sum_row(r[0],r[1])); });
      res.appendChild(c);
    });
  };
  qi.addEventListener('keydown',function(e){ if(e.key==='Enter') doSearch(); });
  var sb=mk_btn('btn-gold','ค้นหา',doSearch); sb.style.cssText='width:auto;padding:12px 20px';
  row.appendChild(qi); row.appendChild(sb);
  wrap.appendChild(row); wrap.appendChild(res);
  pg.appendChild(wrap);
  return pg;
}

function renderBooking(){
  var step=1;
  var form={packageId:'',brideSession:'',firstName:'',lastName:'',nickname:'',
    facebook:'',phone:'',phone2:'',lineId:'',location:'',houseNo:'',soi:'',
    email:'',visionLeft:'',visionRight:'',date:'',readyTime:'',note:''};
  var pg=div('page');
  pg.appendChild(mk_hdr());
  var wrap=div('wrap');
  pg.appendChild(wrap);

  function stepBar(){
    var bar=div('steps');
    var names=['เลือกแพคเกจ','ข้อมูลการจอง','สรุปข้อมูล'];
    names.forEach(function(s,i){
      var w=div('');
      w.innerHTML='<div class="step-c'+(step>i?' done':'')+'">'+( step>i+1?'✓':(i+1) )+'</div>'
        +'<div style="font-size:10px;color:'+(step===i+1?'#C9A96E':'#4A4538')+';white-space:nowrap;text-align:center">'+s+'</div>';
      bar.appendChild(w);
      if(i<2) bar.appendChild(div('step-line'));
    });
    return bar;
  }

  function s1(){
    wrap.innerHTML=''; wrap.appendChild(stepBar());
    var t=el('h2','','เลือกแพคเกจ'); t.style.cssText='font-size:20px;font-weight:300;color:#C9A96E;margin-bottom:6px'; wrap.appendChild(t);
    var sub=p('','กรุณาเลือกบริการที่ต้องการค่ะ'); sub.style.cssText='font-size:13px;color:#7A7060;margin-bottom:24px'; wrap.appendChild(sub);
    var bt=p('','Bridal Package'); bt.style.cssText='font-size:11px;letter-spacing:.2em;color:#7A7060;text-transform:uppercase;margin-bottom:12px'; wrap.appendChild(bt);
    BRIDE_PKGS.forEach(function(pkg){
      var c=div('pkg-c'+(form.packageId===pkg.id?' sel':''));
      c.innerHTML='<div><div style="font-size:15px;color:#E8E4DC;font-weight:500">'+pkg.label+'</div>'
        +'<div style="font-size:12px;color:#7A7060;margin-top:2px">'+pkg.desc+'</div></div>'
        +'<div class="pkg-radio'+(form.packageId===pkg.id?' sel':'')+'"></div>';
      c.onclick=function(){ form.packageId=pkg.id; form.brideSession=''; s1(); };
      wrap.appendChild(c);
    });
    var ot=p('','Special Occasions'); ot.style.cssText='font-size:11px;letter-spacing:.2em;color:#7A7060;text-transform:uppercase;margin:16px 0 12px'; wrap.appendChild(ot);
    var og=div(''); og.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:20px';
    OTHER_PKGS.forEach(function(pkg){
      var c=div('pkg-c'+(form.packageId===pkg.id?' sel':''));
      c.style.cssText='display:flex;align-items:center;justify-content:center;padding:14px;margin-bottom:0';
      c.innerHTML='<span style="font-size:13px;color:'+(form.packageId===pkg.id?'#C9A96E':'#E8E4DC')+'">'+pkg.label+'</span>';
      c.onclick=function(){ form.packageId=pkg.id; s1(); };
      og.appendChild(c);
    });
    wrap.appendChild(og);
    var nb=mk_btn('btn-gold','ถัดไป →',function(){ if(form.packageId){step=2;s2();} });
    nb.style.opacity=form.packageId?'1':'0.4';
    wrap.appendChild(nb);
  }

  function s2(){
    wrap.innerHTML=''; wrap.appendChild(stepBar());

function renderAdmin(){
  var atab='today', sel=null;
  var pg=div('page');
  function rebuildAdmin(){ pg.innerHTML=''; build(); }
  function rebuild(){
    pg.innerHTML='<div style="min-height:60vh;display:flex;align-items:center;justify-content:center"><p style="color:#7A7060;font-size:13px">กำลังโหลด...</p></div>';

      .catch(function(){ loadLocal(); })
      .then(function(){ pg.innerHTML=''; build(); });
  }
  function build(){
    if(!_adminUnlocked){ buildPin(); return; }
    if(sel){ buildDetail(); return; }
    buildMain();
  }

  function buildPin(){
    pg.appendChild(mk_hdr(false));
    var wrap=div('');
    wrap.style.cssText='max-width:360px;margin:60px auto;padding:0 24px;text-align:center';
    var c=div('card'); c.style.padding='40px';
    c.innerHTML='<div style="font-size:32px;margin-bottom:16px">🔐</div>'
      +'<p style="color:#C9A96E;font-size:16px;margin-bottom:6px">Admin</p>'
      +'<p style="color:#7A7060;font-size:12px;margin-bottom:24px">กรุณาใส่รหัส PIN</p>';
    var pi=mk_inp('inp','password','• • • •');
    pi.style.cssText='text-align:center;font-size:16px;letter-spacing:.3em;margin-bottom:8px';
    pi.setAttribute('inputmode','numeric');
    pi.setAttribute('autocomplete','off');
    var ep=p('err','รหัสไม่ถูกต้อง');
    var doLogin=function(){
      if(pi.value===ADMIN_PIN){ _adminUnlocked=true; pg.innerHTML=''; build(); }
      else{ ep.style.display='block'; pi.value=''; }
    };
    pi.addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });
    c.appendChild(pi); c.appendChild(ep);
    c.appendChild(Object.assign(mk_btn('btn-gold','เข้าสู่ระบบ',doLogin),{style:'margin-top:8px'}));
    c.appendChild(Object.assign(mk_btn('btn-ghost','← กลับ',function(){ go('home'); }),{style:'width:100%;margin-top:10px'}));

      note.style.cssText='background:'+(isFirebase?'rgba(109,170,138,.08)':'rgba(201,169,110,.08)')+';border:1px solid '+(isFirebase?'rgba(109,170,138,.25)':'rgba(201,169,110,.25)')+';border-radius:4px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#9A8E7E;display:flex;justify-content:space-between;align-items:center';
      note.innerHTML='<span>'+(isFirebase?'☁ ✓ Firebase: ซิงค์ทุก browser ได้ค่ะ':'⚠ ใช้ localStorage — ต้องแก้ Firebase Rules ก่อนค่ะ')+'</span>';

    function buildCalView(list){
      // Build month selector

      // Default to current month or first available
      var curYm=ymList.indexOf(TODAY.slice(0,7))>=0?TODAY.slice(0,7):ymList[0];

      function buildMonth(ym){
        listEl.innerHTML='';
        // Month nav
        var nav=div(''); nav.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:16px';

        nextBtn.style.cssText='padding:5px 12px;font-size:16px;opacity:'+(nextIdx<ymList.length?'1':'0.3');

        var jobMap={};

          if((b.date||'').startsWith(ym)){

            if(!jobMap[d]) jobMap[d]=[];
            jobMap[d].push(b);
          }
        });

        for(var i=0;i<firstDay;i++){
          grid.appendChild(div(''));
        }
        // Day cells
        for(var day=1;day<=totalDays;day++){
          var cell=div(''); 
          var dateStr=ym+'-'+String(day).padStart(2,'0');
          var jobs=jobMap[day]||[];

          cell.style.cssText='border-radius:6px;padding:6px 4px;text-align:center;min-height:54px;border:1px solid '+(isToday?'rgba(201,169,110,.5)':jobs.length?'rgba(201,169,110,.15)':'rgba(255,255,255,.04)')

          dayNum.textContent=''+day; cell.appendChild(dayNum);

            var dotRow=div(''); dotRow.style.cssText='display:flex;gap:2px;justify-content:center;flex-wrap:wrap';

            cell.appendChild(dotRow);
            // Count label
            if(jobs.length>1){
              var cnt=div(''); cnt.style.cssText='font-size:9px;color:#C9A96E;margin-top:2px';
              cnt.textContent=jobs.length+' งาน'; cell.appendChild(cnt);
            }
            // Click to show day's jobs
            cell.onclick=(function(jj,dStr){ return function(){ showDayJobs(jj,dStr); }; })(jobs, dateStr);
          }
          grid.appendChild(cell);
        }
        listEl.appendChild(grid);

        // Legend
        var leg=div(''); leg.style.cssText='display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;padding:8px 12px;background:rgba(255,255,255,.02);border-radius:4px;border:1px solid rgba(201,169,110,.08)';

        var monthJobs=list.filter(function(b){ return (b.date||'').startsWith(ym); });
        if(monthJobs.length){
          var sg=div('stat3'); sg.style.marginBottom='16px';
          var confirmed=monthJobs.filter(function(b){ return b.status==='confirmed'||b.status==='completed'; });
          var totRev=confirmed.reduce(function(s,b){ return s+(parseFloat(b.packagePrice)||0); },0);
          [{l:'งานทั้งหมด',v:monthJobs.length+' งาน',c:'#C9A96E'},{l:'ยืนยันแล้ว',v:confirmed.length+' งาน',c:'#6DAA8A'},{l:'รายได้',v:totRev.toLocaleString()+' ฿',c:'#E8E4DC'}].forEach(function(s){

            sg.appendChild(sc);

          listEl.appendChild(sg);

            +'<p style="font-size:12px;color:#9A8E7E;margin-top:2px">'+b.packageLabel+'</p>'

      buildMonth(curYm);

    rebuildList();

  // SUMMARY TAB
  function buildSummary(wrap){
    var range='day', sDate=TODAY, sMonth=THIS_M, sYear=THIS_Y;
    var rr=div('range-row'); wrap.appendChild(rr);
    var rbtns={};
    [['day','รายวัน'],['month','รายเดือน'],['year','รายปี']].forEach(function(rv){
      var b=mk_btn('range-btn'+(rv[0]===range?' on':''),rv[1],function(){
        range=rv[0]; Object.keys(rbtns).forEach(function(k){ rbtns[k].className='range-btn'+(k===range?' on':''); });
        di.style.display=range==='day'?'block':'none';
        mi.style.display=range==='month'?'block':'none';
        yi.style.display=range==='year'?'block':'none';
        upd();
      }); rbtns[rv[0]]=b; rr.appendChild(b);
    });
    var di=mk_inp('inp','date','',sDate); di.style.cssText='margin-bottom:20px;color-scheme:dark'; di.onchange=function(){ sDate=di.value; upd(); }; wrap.appendChild(di);
    var mi=mk_inp('inp','month','',sMonth); mi.style.cssText='margin-bottom:20px;color-scheme:dark;display:none'; mi.onchange=function(){ sMonth=mi.value; upd(); }; wrap.appendChild(mi);
    var yi=el('select','inp'); yi.style.cssText='margin-bottom:20px;cursor:pointer;display:none';
    [0,1,2,3].forEach(function(i){ var y=2024+i; var o=el('option','',''+(y+543)); o.value=''+y; if(y===parseInt(sYear)) o.selected=true; yi.appendChild(o); });
    yi.onchange=function(){ sYear=yi.value; upd(); }; wrap.appendChild(yi);
    var cont=div(''); wrap.appendChild(cont);

    function upd(){
      cont.innerHTML='';
      var fil=range==='day'?bk.filter(function(b){ return b.date===sDate; }):range==='month'?bk.filter(function(b){ return b.date.startsWith(sMonth); }):bk.filter(function(b){ return b.date.startsWith(sYear); });
      var done=fil.filter(function(b){ return b.status==='confirmed'||b.status==='completed'; });
      var totP=done.reduce(function(s,b){ return s+(parseFloat(b.packagePrice)||0); },0);
      var totD=done.reduce(function(s,b){ return s+(parseFloat(b.deposit)||0); },0);

      var sg=div('stat2'); cont.appendChild(sg);
      [{l:'งานทั้งหมด',v:fil.length+' งาน',c:'#C9A96E'},{l:'ยืนยัน/เสร็จ',v:done.length+' งาน',c:'#6DAA8A'},
       {l:'รายได้รวม',v:totP.toLocaleString()+' ฿',c:'#E8E4DC'},{l:'มัดจำที่รับ',v:totD.toLocaleString()+' ฿',c:'#6DAA8A'},
       {l:'ค้างชำระ',v:(totP-totD).toLocaleString()+' ฿',c:'#E8A060'},{l:'เฉลี่ย/งาน',v:done.length?(Math.round(totP/done.length).toLocaleString()+' ฿'):'—',c:'#9A8E7E'}
      ].forEach(function(s){ var sc=div('stat-card'); sc.innerHTML='<div style="font-size:11px;color:#7A7060;margin-bottom:5px">'+s.l+'</div><div style="font-size:16px;font-weight:700;color:'+s.c+'">'+s.v+'</div>'; sg.appendChild(sc); });

      // Pie chart
      if(fil.length){
        var pkc={}; fil.forEach(function(b){ pkc[b.packageId]=(pkc[b.packageId]||0)+1; });
        var pd=Object.keys(pkc).map(function(k){ return {label:PKL[k]||k,value:pkc[k],color:PKC[k]||'#6B7280'}; });
        var pc=div('card'); pc.style.marginBottom='16px';
        pc.innerHTML='<p style="font-size:11px;letter-spacing:.15em;color:#7A7060;text-transform:uppercase;margin-bottom:16px;text-align:center">สัดส่วนตามประเภทงาน</p>';
        pc.appendChild(mkPie(pd,fil.length));
        pc.appendChild(mk_div());
        pd.sort(function(a,b2){ return b2.value-a.value; }).forEach(function(s){
          var r=div(''); r.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:10px';
          var bar=div(''); bar.style.cssText='width:6px;height:24px;border-radius:3px;background:'+s.color+';flex-shrink:0';
          var inf=div(''); inf.style.flex='1';
          inf.innerHTML='<div style="display:flex;justify-content:space-between"><span style="font-size:13px;color:#E8E4DC">'+s.label+'</span><span style="font-size:13px;color:'+s.color+';font-weight:600">'+s.value+' งาน</span></div>'
            +'<div style="height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:4px"><div style="height:100%;width:'+Math.round(s.value/fil.length*100)+'%;background:'+s.color+';border-radius:2px"></div></div>';
          r.appendChild(bar); r.appendChild(inf);
          r.appendChild(sp('',Math.round(s.value/fil.length*100)+'%')).style.cssText='font-size:12px;color:#7A7060;min-width:32px;text-align:right';
          pc.appendChild(r);
        });
        cont.appendChild(pc);
      }

      // Tax (year)
      if(range==='year'&&totP>0){
        var exp=Math.min(totP*.6,100000), pex=60000, net=Math.max(0,totP-exp-pex);
        function calcTax(n){ var br=[[150000,0],[300000,.05],[500000,.10],[750000,.15],[1000000,.20],[2000000,.25],[5000000,.30],[1e12,.35]]; var t=0,prev=0; br.forEach(function(b2){ if(n>prev){ t+=(Math.min(n,b2[0])-prev)*b2[1]; prev=b2[0]; } }); return Math.round(t); }
        var tax=calcTax(net), vat=1800000;

  function mkPie(data,total){
    var wrap=div(''); wrap.style.cssText='display:flex;flex-direction:column;align-items:center;margin-bottom:16px';
    var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','160'); svg.setAttribute('height','160'); svg.setAttribute('viewBox','0 0 160 160');
    var cum=-90, r=60, cx=80, cy=80;
    function rad(a){ return a*Math.PI/180; }
    data.forEach(function(d){
      var a=(d.value/total)*360, s=cum; cum+=a;
      var x1=cx+r*Math.cos(rad(s)), y1=cy+r*Math.sin(rad(s));
      var x2=cx+r*Math.cos(rad(s+a)), y2=cy+r*Math.sin(rad(s+a));
      var path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d','M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+',0,'+(a>180?1:0)+',1,'+x2+','+y2+' Z');
      path.setAttribute('fill',d.color); path.setAttribute('stroke','#0A0D14'); path.setAttribute('stroke-width','2');
      svg.appendChild(path);
    });
    var ci=document.createElementNS('http://www.w3.org/2000/svg','circle'); ci.setAttribute('cx',''+cx); ci.setAttribute('cy',''+cy); ci.setAttribute('r','28'); ci.setAttribute('fill','#0A0D14'); svg.appendChild(ci);
    var tx=document.createElementNS('http://www.w3.org/2000/svg','text'); tx.setAttribute('x',''+cx); tx.setAttribute('y',''+(cy-4)); tx.setAttribute('text-anchor','middle'); tx.setAttribute('fill','#C9A96E'); tx.setAttribute('font-size','12'); tx.setAttribute('font-weight','700'); tx.textContent=''+total; svg.appendChild(tx);
    var ts=document.createElementNS('http://www.w3.org/2000/svg','text'); ts.setAttribute('x',''+cx); ts.setAttribute('y',''+(cy+10)); ts.setAttribute('text-anchor','middle'); ts.setAttribute('fill','#7A7060'); ts.setAttribute('font-size','9'); ts.textContent='งาน'; svg.appendChild(ts);
    wrap.appendChild(svg);
    var leg=div(''); leg.style.cssText='display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;max-width:280px';
    data.forEach(function(d){
      var item=div(''); item.style.cssText='display:flex;align-items:center;gap:5px';
      item.innerHTML='<div style="width:8px;height:8px;border-radius:50%;background:'+d.color+';flex-shrink:0"></div><span style="font-size:11px;color:#9A8E7E">'+d.label+' ('+d.value+')</span>';
      leg.appendChild(item);
    });
    wrap.appendChild(leg);
    return wrap;
  }

  build();
  return pg;
}
